<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Maho Maths</title>
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#4D96FF" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="Maho Maths" />

  <!-- Fonts embedded as base64 via Google Fonts CSS — loaded inline so they work offline after first visit -->
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700;800&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --sky: #a8edff;
      --sun: #FFD93D;
      --grass: #6BCB77;
      --coral: #FF6B6B;
      --purple: #C77DFF;
      --blue: #4D96FF;
      --white: #ffffff;
      --dark: #2b2b4b;
    }

    body {
      font-family: 'Nunito', 'Arial Rounded MT Bold', Arial, sans-serif;
      background: linear-gradient(180deg, #a8edff 0%, #d6f5ff 60%, #b5f5c8 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      overflow-x: hidden;
      padding-bottom: 40px;
    }

    /* Floating clouds */
    .clouds {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 160px;
      pointer-events: none;
      z-index: 0;
    }
    .cloud {
      position: absolute;
      background: white;
      border-radius: 50px;
      opacity: 0.85;
      animation: drift linear infinite;
    }
    .cloud::before, .cloud::after {
      content: '';
      position: absolute;
      background: white;
      border-radius: 50%;
    }
    .c1 { width: 120px; height: 40px; top: 20px; animation-duration: 28s; animation-delay: 0s; }
    .c1::before { width: 60px; height: 55px; top: -30px; left: 15px; }
    .c1::after  { width: 45px; height: 40px; top: -20px; left: 50px; }
    .c2 { width: 90px; height: 30px; top: 60px; animation-duration: 22s; animation-delay: -10s; }
    .c2::before { width: 45px; height: 45px; top: -25px; left: 10px; }
    .c2::after  { width: 35px; height: 30px; top: -15px; left: 40px; }
    .c3 { width: 100px; height: 35px; top: 35px; animation-duration: 35s; animation-delay: -5s; }
    .c3::before { width: 50px; height: 50px; top: -28px; left: 12px; }
    .c3::after  { width: 40px; height: 35px; top: -18px; left: 45px; }

    @keyframes drift {
      from { transform: translateX(-160px); }
      to   { transform: translateX(110vw); }
    }

    /* Sun */
    .sun {
      position: fixed;
      top: 18px; right: 30px;
      width: 70px; height: 70px;
      background: var(--sun);
      border-radius: 50%;
      box-shadow: 0 0 0 12px rgba(255,217,61,0.3), 0 0 0 24px rgba(255,217,61,0.12);
      animation: sunPulse 3s ease-in-out infinite;
      z-index: 0;
    }
    @keyframes sunPulse {
      0%,100% { box-shadow: 0 0 0 12px rgba(255,217,61,0.3), 0 0 0 24px rgba(255,217,61,0.12); }
      50%      { box-shadow: 0 0 0 18px rgba(255,217,61,0.35), 0 0 0 36px rgba(255,217,61,0.15); }
    }

    /* Offline banner */
    #offlineBanner {
      display: none;
      position: fixed;
      bottom: 12px; left: 50%;
      transform: translateX(-50%);
      background: var(--dark);
      color: white;
      font-family: 'Nunito', sans-serif;
      font-weight: 800;
      font-size: 0.9rem;
      padding: 8px 22px;
      border-radius: 50px;
      z-index: 999;
    }

    /* Header */
    header {
      position: relative;
      z-index: 1;
      text-align: center;
      margin-top: 50px;
      margin-bottom: 10px;
    }
    header h1 {
      font-family: 'Fredoka One', 'Arial Rounded MT Bold', cursive;
      font-size: clamp(2.2rem, 7vw, 3.6rem);
      color: var(--dark);
      letter-spacing: 1px;
      text-shadow: 3px 3px 0 rgba(0,0,0,0.08);
    }
    header h1 span { color: var(--coral); }
    header p {
      font-size: 1.05rem;
      color: #555;
      margin-top: 4px;
      font-weight: 700;
    }

    /* Score bar */
    .scorebar {
      position: relative; z-index: 1;
      display: flex; gap: 16px;
      background: white;
      border-radius: 50px;
      padding: 10px 28px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
      margin-bottom: 24px;
      font-weight: 800;
      font-size: 1rem;
      color: var(--dark);
    }
    .scorebar .s-item { display: flex; align-items: center; gap: 6px; }
    .badge {
      background: var(--grass);
      color: white;
      border-radius: 20px;
      padding: 2px 12px;
      font-size: 1rem;
    }
    .badge.wrong { background: var(--coral); }

    /* Mode buttons */
    .mode-btns {
      display: flex; gap: 14px;
      margin-bottom: 22px;
      position: relative; z-index: 1;
    }
    .mode-btn {
      font-family: 'Fredoka One', 'Arial Rounded MT Bold', cursive;
      font-size: 1.1rem;
      padding: 10px 28px;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s;
      box-shadow: 0 4px 0 rgba(0,0,0,0.15);
    }
    .mode-btn:active { transform: translateY(3px); box-shadow: 0 1px 0 rgba(0,0,0,0.15); }
    .mode-btn.add  { background: var(--blue); color: white; }
    .mode-btn.sub  { background: var(--coral); color: white; }
    .mode-btn.mix  { background: var(--purple); color: white; }
    .mode-btn.active { outline: 4px solid var(--dark); outline-offset: 2px; }

    /* Card */
    .card {
      position: relative; z-index: 1;
      background: white;
      border-radius: 28px;
      padding: 36px 44px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.13), 0 2px 0 rgba(0,0,0,0.05);
      text-align: center;
      width: min(92vw, 420px);
      animation: popIn 0.35s cubic-bezier(.34,1.56,.64,1);
    }
    @keyframes popIn {
      from { transform: scale(0.85); opacity: 0; }
      to   { transform: scale(1);    opacity: 1; }
    }

    .question {
      font-family: 'Fredoka One', 'Arial Rounded MT Bold', cursive;
      font-size: clamp(2.8rem, 10vw, 4.2rem);
      color: var(--dark);
      letter-spacing: 2px;
      margin-bottom: 22px;
      line-height: 1.1;
    }
    .question .op { color: var(--blue); padding: 0 8px; }
    .question .op.minus { color: var(--coral); }

    /* Dot visualizer */
    .dots-row {
      display: flex; gap: 8px; flex-wrap: wrap;
      justify-content: center;
      margin-bottom: 20px;
      min-height: 36px;
    }
    .dot {
      width: 28px; height: 28px;
      border-radius: 50%;
      background: var(--blue);
      animation: dotPop 0.25s cubic-bezier(.34,1.56,.64,1) both;
    }
    .dot.red { background: var(--coral); }
    @keyframes dotPop {
      from { transform: scale(0); }
      to   { transform: scale(1); }
    }

    /* Answers grid */
    .answers {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
      margin-top: 8px;
    }
    .ans-btn {
      font-family: 'Fredoka One', 'Arial Rounded MT Bold', cursive;
      font-size: 2rem;
      padding: 18px 10px;
      border: none;
      border-radius: 18px;
      cursor: pointer;
      transition: transform 0.12s, box-shadow 0.12s;
      box-shadow: 0 5px 0 rgba(0,0,0,0.18);
      color: white;
    }
    .ans-btn:active { transform: translateY(4px); box-shadow: 0 1px 0 rgba(0,0,0,0.18); }
    .ans-btn:nth-child(1) { background: #FF6B6B; }
    .ans-btn:nth-child(2) { background: #4D96FF; }
    .ans-btn:nth-child(3) { background: #6BCB77; }
    .ans-btn:nth-child(4) { background: #C77DFF; }
    .ans-btn.correct { background: #6BCB77 !important; transform: scale(1.08); }
    .ans-btn.wrong   { background: #ff3333 !important; }
    .ans-btn:disabled { cursor: default; }

    /* Feedback */
    .feedback {
      font-family: 'Fredoka One', 'Arial Rounded MT Bold', cursive;
      font-size: 1.6rem;
      margin-top: 20px;
      min-height: 38px;
      transition: opacity 0.3s;
    }
    .feedback.good { color: var(--grass); }
    .feedback.bad  { color: var(--coral); }

    /* Next btn */
    .next-btn {
      font-family: 'Fredoka One', 'Arial Rounded MT Bold', cursive;
      font-size: 1.3rem;
      padding: 14px 48px;
      border: none;
      border-radius: 50px;
      background: var(--sun);
      color: var(--dark);
      cursor: pointer;
      margin-top: 18px;
      box-shadow: 0 5px 0 rgba(0,0,0,0.15);
      transition: transform 0.12s, box-shadow 0.12s;
      display: none;
    }
    .next-btn.show { display: inline-block; }
    .next-btn:active { transform: translateY(4px); box-shadow: 0 1px 0 rgba(0,0,0,0.15); }

    /* Confetti */
    .confetti-wrap {
      position: fixed; inset: 0;
      pointer-events: none;
      z-index: 999;
    }
    .confetti-piece {
      position: absolute;
      width: 12px; height: 12px;
      border-radius: 3px;
      animation: confettiFall 1s ease-in forwards;
    }
    @keyframes confettiFall {
      0%   { transform: translateY(-20px) rotate(0deg); opacity: 1; }
      100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
    }

    .stars {
      font-size: 1.5rem;
      margin-top: 2px;
      min-height: 28px;
      letter-spacing: 3px;
    }

    .progress-wrap {
      width: 100%;
      background: #e8f4ff;
      border-radius: 20px;
      height: 14px;
      margin-bottom: 20px;
      overflow: hidden;
    }
    .progress-bar {
      height: 100%;
      background: linear-gradient(90deg, var(--blue), var(--purple));
      border-radius: 20px;
      transition: width 0.5s ease;
    }

    @media (max-width: 480px) {
      .card { padding: 26px 20px; }
      .mode-btns { gap: 8px; }
      .mode-btn { padding: 8px 16px; font-size: 0.95rem; }
    }
  </style>
</head>
<body>

  <div class="clouds">
    <div class="cloud c1"></div>
    <div class="cloud c2"></div>
    <div class="cloud c3"></div>
  </div>
  <div class="sun"></div>
  <div class="confetti-wrap" id="confettiWrap"></div>
  <div id="offlineBanner">You are offline - app still works!</div>

  <header>
    <h1>Maho <span>Maths</span></h1>
    <p>Addition and Subtraction for Grade 1</p>
  </header>

  <div class="scorebar">
    <div class="s-item">Right: <span class="badge" id="scoreRight">0</span></div>
    <div class="s-item">Wrong: <span class="badge wrong" id="scoreWrong">0</span></div>
  </div>
  <div class="stars" id="starsRow"></div>

  <div class="mode-btns">
    <button class="mode-btn add active" onclick="setMode('add', this)">Addition</button>
    <button class="mode-btn sub" onclick="setMode('sub', this)">Subtraction</button>
    <button class="mode-btn mix" onclick="setMode('mix', this)">Mix</button>
  </div>

  <div class="card">
    <div class="progress-wrap">
      <div class="progress-bar" id="progressBar" style="width:0%"></div>
    </div>
    <div class="question" id="question"></div>
    <div class="dots-row" id="dotsRow"></div>
    <div class="answers" id="answers"></div>
    <div class="feedback" id="feedback"></div>
    <button class="next-btn" id="nextBtn" onclick="nextQuestion()">Next Question</button>
  </div>

  <script>
    // ── Register Service Worker for offline ──
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js').catch(() => {});
    }

    // ── Offline banner ──
    window.addEventListener('offline', () => {
      document.getElementById('offlineBanner').style.display = 'block';
    });
    window.addEventListener('online', () => {
      document.getElementById('offlineBanner').style.display = 'none';
    });

    // ── Game logic ──
    let mode = 'add';
    let correct = 0, wrong = 0;
    let answered = false;
    let totalAsked = 0;
    const TOTAL = 10;

    const goodMessages = ['Brilliant!', 'Well done!', 'Correct!', 'Amazing!', 'Super!', 'Great job!', 'Yes!', 'Fantastic!'];
    const badMessages  = ['Try again!', 'Not quite!', 'Oops!', 'Almost!', 'Keep going!'];
    const colors = ['#FF6B6B','#4D96FF','#6BCB77','#C77DFF','#FFB347','#FF6FA8'];

    function setMode(m, btn) {
      mode = m;
      document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      correct = 0; wrong = 0; totalAsked = 0;
      updateScore();
      nextQuestion();
    }

    function rand(min, max) {
      return Math.floor(Math.random() * (max - min + 1)) + min;
    }

    function generateQuestion() {
      let type = mode === 'mix' ? (Math.random() < 0.5 ? 'add' : 'sub') : mode;
      let a, b, ans;
      if (type === 'add') {
        a = rand(1, 10);
        b = rand(1, Math.min(10, 19 - a));
        ans = a + b;
      } else {
        ans = rand(1, 10);
        b = rand(1, ans);
        a = ans + b;
      }
      return { a, b, ans, type };
    }

    function shuffleAnswers(correct) {
      let choices = new Set([correct]);
      while (choices.size < 4) {
        let v = correct + rand(-4, 4);
        if (v >= 0 && v <= 19 && v !== correct) choices.add(v);
      }
      return [...choices].sort(() => Math.random() - 0.5);
    }

    let currentQuestion = null;

    function renderDots(a, b, type) {
      const row = document.getElementById('dotsRow');
      row.innerHTML = '';
      const total = type === 'add' ? a + b : a;
      for (let i = 0; i < total; i++) {
        const d = document.createElement('div');
        d.className = 'dot' + (type === 'sub' && i >= a - b ? ' red' : '');
        d.style.animationDelay = (i * 0.04) + 's';
        row.appendChild(d);
      }
    }

    function nextQuestion() {
      if (totalAsked >= TOTAL) { showEndScreen(); return; }
      answered = false;
      document.getElementById('feedback').textContent = '';
      document.getElementById('feedback').className = 'feedback';
      document.getElementById('nextBtn').classList.remove('show');

      currentQuestion = generateQuestion();
      const { a, b, type, ans } = currentQuestion;
      const op = type === 'add' ? '+' : '-';
      const opClass = type === 'add' ? 'op' : 'op minus';
      document.getElementById('question').innerHTML =
        `${a} <span class="${opClass}">${op}</span> ${b} <span class="op">=</span> ?`;

      renderDots(a, b, type);

      const choices = shuffleAnswers(ans);
      const answersEl = document.getElementById('answers');
      answersEl.innerHTML = '';
      choices.forEach(c => {
        const btn = document.createElement('button');
        btn.className = 'ans-btn';
        btn.textContent = c;
        btn.onclick = () => checkAnswer(c, btn);
        answersEl.appendChild(btn);
      });

      totalAsked++;
      document.getElementById('progressBar').style.width = ((totalAsked - 1) / TOTAL * 100) + '%';
    }

    function checkAnswer(chosen, btn) {
      if (answered) return;
      answered = true;
      const { ans } = currentQuestion;
      const fb = document.getElementById('feedback');

      document.querySelectorAll('.ans-btn').forEach(b => {
        b.disabled = true;
        if (parseInt(b.textContent) === ans) b.classList.add('correct');
      });

      if (chosen === ans) {
        correct++;
        btn.classList.add('correct');
        fb.textContent = goodMessages[rand(0, goodMessages.length - 1)];
        fb.className = 'feedback good';
        launchConfetti();
      } else {
        wrong++;
        btn.classList.add('wrong');
        fb.textContent = badMessages[rand(0, badMessages.length - 1)] + ' The answer is ' + ans;
        fb.className = 'feedback bad';
      }

      updateScore();
      document.getElementById('progressBar').style.width = (totalAsked / TOTAL * 100) + '%';
      document.getElementById('nextBtn').classList.add('show');
    }

    function updateScore() {
      document.getElementById('scoreRight').textContent = correct;
      document.getElementById('scoreWrong').textContent = wrong;
      let stars = '';
      for (let i = 0; i < correct; i++) stars += '\u2605';
      document.getElementById('starsRow').textContent = stars;
    }

    function launchConfetti() {
      const wrap = document.getElementById('confettiWrap');
      for (let i = 0; i < 28; i++) {
        const p = document.createElement('div');
        p.className = 'confetti-piece';
        p.style.left = rand(10, 90) + 'vw';
        p.style.top = rand(-10, 10) + 'px';
        p.style.background = colors[rand(0, colors.length - 1)];
        p.style.animationDuration = (0.7 + Math.random() * 0.6) + 's';
        p.style.animationDelay = (Math.random() * 0.3) + 's';
        wrap.appendChild(p);
        setTimeout(() => p.remove(), 1500);
      }
    }

    function showEndScreen() {
      const card = document.querySelector('.card');
      const grade = correct >= 8 ? 'Amazing!' : correct >= 5 ? 'Good work!' : 'Keep practising!';
      card.innerHTML = `
        <div style="font-family:'Fredoka One','Arial Rounded MT Bold',cursive; font-size:2rem; color:var(--dark); margin-bottom:12px;">All done!</div>
        <div style="font-size:3.5rem; margin: 10px 0; letter-spacing:4px;">
          ${'&#9733;'.repeat(correct)}${'&#9734;'.repeat(TOTAL - correct)}
        </div>
        <div style="font-family:'Fredoka One','Arial Rounded MT Bold',cursive; font-size:1.8rem; color:var(--grass); margin:10px 0;">
          ${correct} out of ${TOTAL} correct
        </div>
        <div style="font-size:1.3rem; color:#666; margin-bottom:24px;">${grade}</div>
        <button class="next-btn show" onclick="restartGame()" style="display:inline-block;">Play Again</button>
      `;
      if (correct >= 8) launchConfetti();
    }

    function restartGame() {
      correct = 0; wrong = 0; totalAsked = 0;
      updateScore();
      const card = document.querySelector('.card');
      card.innerHTML = `
        <div class="progress-wrap"><div class="progress-bar" id="progressBar" style="width:0%"></div></div>
        <div class="question" id="question"></div>
        <div class="dots-row" id="dotsRow"></div>
        <div class="answers" id="answers"></div>
        <div class="feedback" id="feedback"></div>
        <button class="next-btn" id="nextBtn" onclick="nextQuestion()">Next Question</button>
      `;
      nextQuestion();
    }

    nextQuestion();
  </script>
</body>
</html>
